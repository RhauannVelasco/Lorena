<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lorena ♥</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000008; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="hc"></canvas>
<script>
(function(){
const cv = document.getElementById('hc');
const g  = cv.getContext('2d');

const isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 600;
const TARGET_FPS = isMobile ? 30 : 60;
const FRAME_MS   = 1000 / TARGET_FPS;

let W, H, CX, CY, BSC;
function setDims(){
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W; cv.height = H;
  // pixel ratio cap em 1.5 no mobile pra não renderizar 2x
  const pr = Math.min(window.devicePixelRatio || 1, isMobile ? 1.5 : 2);
  cv.width  = W * pr; cv.height = H * pr;
  cv.style.width  = W + 'px'; cv.style.height = H + 'px';
  g.scale(pr, pr);
  CX = W/2; CY = H/2 + H*0.03; BSC = Math.min(W,H)/38;
}
setDims();

function hpt(t, sc){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
  return { x: CX+x*sc, y: CY+y*sc };
}

// pontos do coração — menos no mobile
let pts = [];
function buildPts(){
  const shells = isMobile ? [
    { sc: BSC*0.72, n: 30, fsMul: 0.16, alpha: 0.4,  shimSpeed: 1.0 },
    { sc: BSC,      n: 45, fsMul: 0.25, alpha: 0.8,  shimSpeed: 0.7 },
    { sc: BSC*1.05, n: 18, fsMul: 0.18, alpha: 0.25, shimSpeed: 1.2 },
  ] : [
    { sc: BSC*0.72, n: 55, fsMul: 0.19, alpha: 0.38, shimSpeed: 1.1 },
    { sc: BSC,      n: 80, fsMul: 0.28, alpha: 0.75, shimSpeed: 0.8 },
    { sc: BSC*1.06, n: 30, fsMul: 0.21, alpha: 0.28, shimSpeed: 1.4 },
  ];
  pts = [];
  for(const sh of shells){
    for(let i=0;i<sh.n;i++){
      const t=(i/sh.n)*Math.PI*2;
      const p=hpt(t,sh.sc);
      const normY=(p.y-(CY-sh.sc*13))/(sh.sc*26);
      const fs=sh.fsMul*BSC+normY*sh.fsMul*BSC*0.6;
      pts.push({
        ...p, fs: Math.max(6, Math.min(fs, 18)),
        alpha: sh.alpha,
        shimSpeed:  sh.shimSpeed*(0.7+Math.random()*0.6),
        shimOffset: Math.random()*Math.PI*2,
        floatA:  1+Math.random()*2,
        floatF:  0.3+Math.random()*0.4,
        floatP:  Math.random()*Math.PI*2,
        floatAy: 0.5+Math.random()*1.2,
        floatFy: 0.2+Math.random()*0.35,
        floatPy: Math.random()*Math.PI*2,
      });
    }
  }
}
buildPts();

// poeira — bem menos no mobile
let dust = [];
function buildDust(){
  const n = isMobile ? 40 : 100;
  dust = Array.from({length:n}, ()=>({
    x: Math.random()*W, y: Math.random()*H,
    r: 0.5+Math.random()*1.5,
    a: Math.random()*Math.PI*2,
    spd: 0.06+Math.random()*0.14,
    drift: (Math.random()-.5)*0.2,
    alpha: 0.08+Math.random()*0.25,
    col: Math.random()<0.5?[80,160,255]:[180,220,255],
  }));
}
buildDust();

// corações flutuantes — poucos no mobile
const fhearts=[];
function spawnFH(){
  if(fhearts.length > (isMobile?6:15)) return;
  fhearts.push({
    x: Math.random()*W, y: H+10,
    vy: -(0.35+Math.random()*0.45),
    vx: (Math.random()-.5)*0.25,
    alpha:0, size:8+Math.random()*10,
    life:0, maxLife:160+Math.random()*100,
    col: Math.random()<0.6?'#4da6ff':'#b3d9ff',
  });
}
for(let i=0;i<(isMobile?4:8);i++) spawnFH();

// toque
function onTouch(e){
  const src = e.changedTouches || [e];
  for(const t of src){
    for(let i=0;i<4;i++){
      const angle=(i/4)*Math.PI*2;
      fhearts.push({
        x:t.clientX, y:t.clientY,
        vx:Math.cos(angle)*(1+Math.random()),
        vy:Math.sin(angle)*(1+Math.random())-0.5,
        alpha:0, size:10+Math.random()*12,
        life:0, maxLife:80+Math.random()*50,
        col:'#b3d9ff',
      });
    }
  }
}
cv.addEventListener('touchstart', onTouch, {passive:true});
cv.addEventListener('click', onTouch);

window.addEventListener('resize', ()=>{ setDims(); buildPts(); buildDust(); });

// revelação
let nameReveal=0, msgReveal=0, nameGlowPhase=0;
const NAME_TIME=1.5, MSG_TIME=4.0;

// shimmer SEM shadowBlur (pesado) — usa só gradiente
function drawShimmerText(px, py, fontSize, pointAlpha, shimSpeed, shimOffset, elapsed){
  g.font=`italic bold ${fontSize.toFixed(1)}px Georgia,serif`;
  const text='I love you';
  const tw=g.measureText(text).width;
  const wave=((elapsed*shimSpeed*0.4+shimOffset/(Math.PI*2))%1);
  const shimX=-tw*0.3+wave*(tw*1.6);

  const grd=g.createLinearGradient(px-tw/2,0,px+tw/2,0);
  const rel=p=>Math.max(0,Math.min(1,(shimX/tw)+p/tw));
  const s0=rel(-tw*0.5),s1=rel(-tw*0.08),s2=rel(0),s3=rel(tw*0.08),s4=rel(tw*0.5);
  grd.addColorStop(0,                    `rgba(70,140,240,${pointAlpha})`);
  grd.addColorStop(Math.max(0,s0-0.001), `rgba(70,140,240,${pointAlpha})`);
  grd.addColorStop(s0, `rgba(150,200,255,${Math.min(1,pointAlpha*1.3)})`);
  grd.addColorStop(s1, `rgba(220,238,255,${Math.min(1,pointAlpha*1.6)})`);
  grd.addColorStop(s2, `rgba(255,255,255,${Math.min(1,pointAlpha*1.9)})`);
  grd.addColorStop(s3, `rgba(220,238,255,${Math.min(1,pointAlpha*1.6)})`);
  grd.addColorStop(Math.min(1,s4+0.001), `rgba(150,200,255,${Math.min(1,pointAlpha*1.3)})`);
  grd.addColorStop(1,                    `rgba(70,140,240,${pointAlpha})`);

  g.fillStyle=grd;
  g.textAlign='center';
  g.textBaseline='middle';
  // shadowBlur ZERO nos textos pequenos — maior custo de perf
  g.fillText(text,px,py);
}

function drawName(elapsed, reveal){
  if(reveal<=0) return;
  nameGlowPhase+=0.025;
  const gp=0.75+0.25*Math.sin(nameGlowPhase);
  const sw=(elapsed*0.3)%1;
  const nfs=Math.min(W,H)*(isMobile?0.12:0.10);
  const ny=CY-BSC*1.5;
  const al=Math.min(1,reveal*1.5);

  g.save();
  g.globalAlpha=al;
  g.font=`italic bold ${nfs}px Georgia,serif`;
  g.textAlign='center'; g.textBaseline='middle';
  const tw=g.measureText('Lorena').width;

  // glow em apenas 1 camada (não 2) pra mobile
  if(!isMobile){
    g.shadowColor=`rgba(80,160,255,${0.7*gp})`;
    g.shadowBlur=nfs*1.6;
    g.fillStyle=`rgba(180,220,255,${0.12*gp})`;
    g.fillText('Lorena',CX,ny);
    g.shadowBlur=0;
  }

  // shimmer
  const sp=-tw*0.4+sw*(tw*1.8);
  const grd=g.createLinearGradient(CX-tw/2,0,CX+tw/2,0);
  const r=p=>Math.max(0,Math.min(1,(sp/tw)+p/tw));
  grd.addColorStop(0,'rgba(100,170,255,0.85)');
  grd.addColorStop(Math.max(0,r(-tw*0.45)-0.001),'rgba(100,170,255,0.85)');
  grd.addColorStop(r(-tw*0.45),'rgba(180,220,255,1)');
  grd.addColorStop(r(-tw*0.08),'rgba(220,240,255,1)');
  grd.addColorStop(r(0),'rgba(255,255,255,1)');
  grd.addColorStop(r(tw*0.08),'rgba(220,240,255,1)');
  grd.addColorStop(Math.min(1,r(tw*0.45)+0.001),'rgba(180,220,255,1)');
  grd.addColorStop(1,'rgba(100,170,255,0.85)');
  g.shadowColor=`rgba(80,160,255,${0.5*gp})`;
  g.shadowBlur=isMobile?nfs*0.5:nfs*0.8;
  g.fillStyle=grd;
  g.fillText('Lorena',CX,ny);
  g.shadowBlur=0;

  // partículas orbitando — só desktop
  if(!isMobile && reveal>=1){
    for(let i=0;i<6;i++){
      const angle=(i/6)*Math.PI*2+elapsed*0.8;
      const sx=CX+Math.cos(angle)*(tw*0.55+Math.sin(elapsed*1.5+i)*6);
      const sy=ny+Math.sin(angle)*nfs*0.35;
      g.beginPath();
      g.arc(sx,sy,2+Math.sin(elapsed*3+i),0,Math.PI*2);
      g.fillStyle=`rgba(200,230,255,${(0.4+0.4*Math.sin(elapsed*2+i))*gp})`;
      g.fill();
    }
  }

  // linha decorativa
  if(reveal>0.6){
    const la=(reveal-0.6)/0.4;
    const lw=tw*0.55*Math.min(1,(reveal-0.6)/0.3);
    g.strokeStyle=`rgba(120,190,255,${0.35*la})`;
    g.lineWidth=0.8;
    g.beginPath();
    g.moveTo(CX-lw/2,ny+nfs*0.62);
    g.lineTo(CX+lw/2,ny+nfs*0.62);
    g.stroke();
  }
  g.restore();
}

function drawMessage(elapsed, reveal){
  if(reveal<=0) return;
  const mfs=Math.min(W,H)*(isMobile?0.042:0.034);
  const nfs=Math.min(W,H)*(isMobile?0.12:0.10);
  const ny=CY-BSC*1.5;
  const my=ny+nfs*0.88;
  const al=Math.min(1,reveal*2);
  const pulse=0.75+0.25*Math.sin(elapsed*1.4);

  g.save();
  g.font=`italic ${mfs}px Georgia,serif`;
  g.textAlign='center'; g.textBaseline='middle';

  // linha 1
  g.globalAlpha=al*pulse;
  g.shadowColor='rgba(100,180,255,0.5)';
  g.shadowBlur=isMobile?mfs*0.5:mfs*1.0;
  g.fillStyle='rgba(200,230,255,0.92)';
  g.fillText('Feliz dia dos namorados, minha princesa',CX,my);
  g.shadowBlur=0;

  // coração central
  const hs=mfs*1.15*(1+0.12*Math.sin(elapsed*2.2));
  g.font=`${hs}px Georgia,serif`;
  g.globalAlpha=al*0.9;
  g.shadowColor='#4da6ff';
  g.shadowBlur=isMobile?6:10;
  g.fillStyle='#b3d9ff';
  g.fillText('♥',CX,my+mfs*1.7);
  g.shadowBlur=0;

  // linha 2
  g.font=`italic ${mfs}px Georgia,serif`;
  g.globalAlpha=al*pulse;
  g.shadowColor='rgba(100,180,255,0.5)';
  g.shadowBlur=isMobile?mfs*0.5:mfs*1.0;
  g.fillStyle='rgba(200,230,255,0.92)';
  g.fillText('você é a minha paz',CX,my+mfs*3.5);
  g.shadowBlur=0;

  g.restore();
}

// contorno do coração — simplificado no mobile
function drawOutline(elapsed, pulse){
  const steps = isMobile ? 120 : 300;
  for(let layer=0;layer<(isMobile?1:2);layer++){
    const lsc=BSC*(layer===0?1.04:1.0);
    const la=layer===0?0.07+pulse*0.05:0.18+pulse*0.10;
    g.save();
    g.strokeStyle=`rgba(60,140,255,${la})`;
    g.lineWidth=layer===0?2:0.8;
    if(!isMobile){ g.shadowColor='rgba(60,140,255,0.4)'; g.shadowBlur=layer===0?16:4; }
    g.beginPath();
    for(let i=0;i<=steps;i++){
      const t=(i/steps)*Math.PI*2;
      const wobble=isMobile?0:Math.sin(elapsed*1.8+t)*0.8;
      const p=hpt(t,lsc+wobble);
      i===0?g.moveTo(p.x,p.y):g.lineTo(p.x,p.y);
    }
    g.closePath(); g.stroke();
    g.shadowBlur=0;
    g.restore();
  }
}

// loop com throttle de FPS
let lastTime=null, elapsed=0, lastFrame=0;

function frame(ts){
  requestAnimationFrame(frame);
  if(ts - lastFrame < FRAME_MS) return; // throttle
  const dt=lastTime?Math.min((ts-lastTime)/1000,0.05):0;
  lastTime=ts; lastFrame=ts;
  elapsed+=dt;

  if(elapsed>NAME_TIME) nameReveal=Math.min(1,nameReveal+dt*1.2);
  if(elapsed>MSG_TIME)  msgReveal =Math.min(1,msgReveal +dt*0.8);

  // fundo
  g.fillStyle='rgba(0,0,12,0.85)';
  g.fillRect(0,0,W,H);

  // glow central — radial simples
  const pulse=Math.sin(elapsed*1.1)*0.5+0.5;
  const gr=g.createRadialGradient(CX,CY,5,CX,CY,BSC*13);
  gr.addColorStop(0,`rgba(10,80,200,${0.09+pulse*0.07})`);
  gr.addColorStop(0.5,`rgba(0,30,100,${0.04+pulse*0.03})`);
  gr.addColorStop(1,'rgba(0,0,20,0)');
  g.fillStyle=gr; g.fillRect(0,0,W,H);

  drawOutline(elapsed,pulse);

  // poeira
  for(const d of dust){
    d.a+=d.spd*0.016;
    d.x+=Math.cos(d.a)*d.spd+d.drift; d.y-=0.10;
    if(d.y<-5){d.y=H+5;d.x=Math.random()*W;}
    if(d.x<0)d.x=W; if(d.x>W)d.x=0;
    g.beginPath();
    g.arc(d.x,d.y,d.r,0,Math.PI*2);
    g.fillStyle=`rgba(${d.col[0]},${d.col[1]},${d.col[2]},${d.alpha})`;
    g.fill();
  }

  // corações flutuantes
  for(let i=fhearts.length-1;i>=0;i--){
    const fh=fhearts[i];
    fh.x+=fh.vx; fh.y+=fh.vy; fh.life++;
    fh.alpha=fh.life<15?fh.life/15:fh.life>fh.maxLife-25?(fh.maxLife-fh.life)/25:0.7;
    if(fh.life>=fh.maxLife){fhearts.splice(i,1);spawnFH();continue;}
    g.save();
    g.globalAlpha=fh.alpha*0.7;
    g.font=`${fh.size}px Georgia,serif`;
    g.textAlign='center';
    g.fillStyle=fh.col;
    g.fillText('♥',fh.x,fh.y);
    g.restore();
  }

  // textos
  g.save();
  for(const p of pts){
    const fx=Math.cos(p.floatF*elapsed+p.floatP)*p.floatA;
    const fy=Math.sin(p.floatFy*elapsed+p.floatPy)*p.floatAy;
    drawShimmerText(p.x+fx,p.y+fy,p.fs,p.alpha,p.shimSpeed,p.shimOffset,elapsed);
  }
  g.restore();

  drawName(elapsed,nameReveal);
  drawMessage(elapsed,msgReveal);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
